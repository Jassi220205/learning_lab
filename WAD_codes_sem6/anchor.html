<h2>The href attribute</h2>

<p>The href attribute is used to specify the URL or address that a link goes to.</p>

<a href="https://www.youtube.com">Visit YouTube</a><br>
<a href="https://www.google.com">Search with Google</a><br>
<a href="https://www.instagram.com">Open Instagram</a><br>
<a href="https://www.gitam.edu">Visit GITAM University Website</a><br>
<a href="https://www.gmail.com">Open Gmail</a>
