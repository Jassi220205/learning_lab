<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors</title>
    <style>
        p {
            color: blue;
        }

        .highlight {
            background-color: yellow;
        }

        #main {
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<p>This is a normal paragraph</p>
<p class="highlight">This uses class selector</p>
<p id="main">This uses ID selector</p>

</body>
</html>
