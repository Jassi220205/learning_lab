<!DOCTYPE html>
<html>
<head>
    <title>JS Output Methods</title>
</head>
<body>
    <h2>JavaScript Output Methods</h2>
    <p id="demo"></p>

    <script>
        
        let name = "Jassmitha";
        let age = 20;
        let cgpa = 8.7;

        document.write("Name: " + name + "<br>");

        alert("Age: " + age);

        console.log("CGPA:", cgpa);

        document.getElementById("demo").innerHTML =
            "Student: " + name + ", CGPA: " + cgpa;
    </script>
</body>
</html>
