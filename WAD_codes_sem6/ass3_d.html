<!DOCTYPE html>
<html>
<head>
    <title>FoodExpress</title>
</head>
<body>
    <h1>FoodExpress</h1>
    <p>Your favorite food, delivered fast.</p>

    <button onclick="orderFood()">Order Now</button>

    <p id="status"></p>

    <script>
        function orderFood() {
            document.getElementById("status").innerHTML =
                "Order placed successfully!";
        }
    </script>
</body>
</html>
