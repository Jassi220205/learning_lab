<h1>Image Tag</h1>

<p>
The &lt;img&gt; tag is used to display images on a web page.<br>
It is an empty tag and mainly uses the src, alt, width, and height attribute
</p>

<p>Nature</p>
<img src="coffee.png"
     alt="Coffee" width="300" height="200"><br>

     alt="COffee" width="300" height="200"><br>

<p>Technology</p>

     alt="Coffee" width="300" height="200"><br>
